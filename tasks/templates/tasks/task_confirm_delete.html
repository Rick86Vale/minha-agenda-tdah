{% extends 'base.html' %}

<!-- templates/tasks/task_confirm_delete.html -->
{% block content %}
<style>
    .delete-container {
        max-width: 450px;
        margin: 60px auto;
        background: #ffffff;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        text-align: center;
    }
    h2 { color: #e74c3c; margin-bottom: 20px; }
    p { color: #555; margin-bottom: 30px; font-size: 1.1em; }
    
    .actions { display: flex; gap: 15px; justify-content: center; }
    
    button {
        padding: 12px 25px;
        background-color: #e74c3c;
        color: white;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.3s;
    }
    button:hover { background-color: #c0392b; }
    
    .cancel-link {
        padding: 12px 25px;
        background-color: #f8f9fa;
        color: #666;
        text-decoration: none;
        border-radius: 8px;
        font-weight: 600;
        transition: background 0.3s;
    }
    .cancel-link:hover { background-color: #e9ecef; }
</style>

<div class="delete-container">
    <h2>Confirmar exclusão</h2>
    <p>Você tem certeza que deseja excluir a tarefa <strong>"{{ task.title }}"</strong>?</p>
    
    <form method="post">
    {% csrf_token %}
    <!-- Adiciona este campo oculto para segurar a URL de retorno -->
    {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
    {% endif %}
    
    <div class="actions">
        <button type="submit">Sim, excluir</button>
        <a href="{{ next|default:'/calendar/' }}" class="cancel-link">Cancelar</a>
    </div>
</form>
</div>
{% endblock %}
