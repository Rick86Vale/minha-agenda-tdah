{% extends 'base.html' %}
{% block content %}
<div class="box">
    <h2>Confirmar exclusão</h2>
    <p>Você tem certeza que deseja excluir a tarefa "{{ task.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Sim, excluir</button>
        <a href="{% url 'task_detail' task.id %}">Cancelar</a>
    </form>
</div>
{% endblock %}
